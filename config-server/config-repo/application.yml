# Shared configuration inherited by every microservice (spring.application.name != config-server)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,circuitbreakers
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.regulareedge: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
  file:
    name: logs/spring.log

jwt:
  secret: RegulareEdgeSecretKeyForJwtSigningMustBeAtLeast256BitsLongForHS256Algorithm2026
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 604800000

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    configs:
      default:
        timeout-duration: 2s
  ratelimiter:
    configs:
      default:
        limit-for-period: 20
        limit-refresh-period: 1s
        timeout-duration: 0s
