server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/compliancecoredb?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

services:
  auth-service:
    name: auth-service
  notification-service:
    name: notification-service

file:
  upload-dir: uploads/compliance-core-service
